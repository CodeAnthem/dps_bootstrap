name: ShellCheck

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint bootstrap scripts
        run: |
          set -euo pipefail
          mapfile -t scripts < <(
            find bootstrap actions -name '*.sh' \
              ! -path '*/setup_old.sh' \
              ! -path '*/deployTools/*' \
              ! -path '*/tests/*' \
              ! -path '*/actions/test/*' \
              | sort
          )
          scripts+=(start.sh)
          shellcheck "${scripts[@]}"

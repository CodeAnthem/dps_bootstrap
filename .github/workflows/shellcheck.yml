name: ShellCheck

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          set -euo pipefail
          ver=0.10.0
          curl -sSL "https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.xz" \
            | tar -xJ
          sudo install "shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Lint bootstrap scripts
        run: |
          set -euo pipefail
          mapfile -t scripts < <(
            find bootstrap actions -name '*.sh' \
              ! -path '*/setup_old.sh' \
              ! -path '*/deployTools/*' \
              ! -path '*/tests/*' \
              ! -path '*/actions/test/*' \
              | sort
          )
          scripts+=(start.sh)
          shellcheck -S warning --rcfile=.shellcheckrc "${scripts[@]}"
